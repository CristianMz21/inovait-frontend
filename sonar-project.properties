sonar.projectKey=inovait-frontend
sonar.projectName=Inovait Frontend
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts
sonar.tests=src,e2e
sonar.exclusions=src/**/*.spec.ts,src/testing/**,.agents/**,.atl/**,.playwright-mcp/**,.specify/**,.superpowers/**,.angular/**,dist/**,coverage/**,playwright-report*/**,test-results/**
sonar.test.inclusions=src/**/*.spec.ts,src/testing/**,e2e/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.app.json,tsconfig.spec.json,tsconfig.e2e.json

sonar.text.inclusions.activate=true
sonar.text.inclusions=**/*.md,**/*.http

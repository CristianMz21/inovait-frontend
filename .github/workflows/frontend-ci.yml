name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:eslint
      - run: npm run lint:style
      - run: npm run test:coverage
      - run: npm run build:development
      - run: npm run build:production
      - run: ./node_modules/.bin/playwright install --with-deps chromium
      - name: Run development mock and production no-mock E2E with axe
        run: npm run e2e
      - run: npm audit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: error
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            playwright-report-production
            test-results/playwright
            test-results/playwright-production
          if-no-files-found: ignore

  # Cross-repo gate: confirms the OpenAPI contract this frontend was built
  # against is still the authorized baseline (or an explicitly approved
  # successor commit) in inovait-backend. See
  # src/app/scripts/verify-openapi-contract.mjs.
  #
  # CI runs with CONTRACT_VERIFY_ALLOW_UNAPPROVED_HEAD=1: an unapproved
  # backend HEAD does not fail the job by itself as long as the contract
  # tree is checksum-identical to the authorized baseline -- it logs a
  # WARNING instead, since every new backend commit (including ones that
  # never touch the contracts directory) would otherwise break this job.
  # The job still fails on real contract-content drift (checksum mismatch)
  # or on missing/untracked/dirty contract files. Outside CI (local runs,
  # evaluator installs) the env var is unset and the strict provenance gate
  # -- HEAD must be the authorized commit or an explicitly reviewed entry
  # in APPROVED_SUCCESSORS -- remains the default. Warnings from CI should
  # still be reviewed and, once deliberate, promoted into
  # APPROVED_SUCCESSORS.
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout inovait-frontend
        uses: actions/checkout@v4
        with:
          path: inovait-frontend

      # Public repo, read-only checkout: no token needed. Default
      # fetch-depth: 1 is sufficient -- the script only inspects HEAD and
      # `git status`/`git ls-files` on the working tree, it never walks
      # history.
      - name: Checkout inovait-backend
        uses: actions/checkout@v4
        with:
          repository: CristianMz21/inovait-backend
          path: inovait-backend

      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1

      # The script (src/app/scripts/verify-openapi-contract.mjs) imports
      # only node:crypto / node:child_process / node:fs / node:url -- no
      # npm dependencies, so `npm ci` is unnecessary here. It resolves the
      # backend contracts directory as `<frontend-repo-root>/../inovait-backend/...`,
      # which matches this sibling checkout layout under $GITHUB_WORKSPACE.
      - name: Verify OpenAPI contract against backend repo
        working-directory: inovait-frontend
        env:
          CONTRACT_VERIFY_ALLOW_UNAPPROVED_HEAD: "1"
        run: node src/app/scripts/verify-openapi-contract.mjs

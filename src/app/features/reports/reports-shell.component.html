<div class="reports-shell">
  <header class="reports-shell-header">
    <h1 id="reports-title" tabindex="-1">Reportes operativos</h1>
    <p class="reports-shell-description">
      Consulte los reportes operativos de matrícula y planta docente. Seleccione
      una pestaña para ver un reporte a la vez.
    </p>
  </header>

  <div
    class="reports-shell-tablist"
    role="tablist"
    aria-labelledby="reports-title"
  >
    @for (section of sections(); track section.id) {
      <button
        #tabButton
        type="button"
        id="tab-{{ section.id }}"
        role="tab"
        class="reports-shell-tab"
        [attr.aria-selected]="isActive(section.id) ? 'true' : 'false'"
        [attr.aria-controls]="section.id"
        [tabIndex]="tabIndexFor(section.id)"
        (click)="activate(section.id)"
        (keydown)="onTablistKeydown($event, section.id)"
      >
        {{ section.label }}
      </button>
    }
  </div>

  <div
    id="age-report"
    role="tabpanel"
    aria-labelledby="tab-age-report"
    [hidden]="!isActive('age-report')"
  >
    <app-age-distribution />
  </div>

  <div
    id="sector-report"
    role="tabpanel"
    aria-labelledby="tab-sector-report"
    [hidden]="!isActive('sector-report')"
  >
    <app-teacher-counts-by-sector />
  </div>

  <div
    id="top-schools-report"
    role="tabpanel"
    aria-labelledby="tab-top-schools-report"
    [hidden]="!isActive('top-schools-report')"
  >
    <app-top-schools />
  </div>
</div>
